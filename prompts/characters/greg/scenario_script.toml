[scenario]
name = "Greg's Lemonade Stand — Flier Run"
start = "watching"

[[stage]]
name = "watching"
goal = "Greg is alone at his stand, watching foot traffic. He fidgets, adjusts his fliers, and talks to himself."

[[stage.exit]]
condition = "Someone is approaching or looking at the stand"
goto = "spotted"
label = "notices"

[[stage.exit]]
condition = "Someone walks past without stopping"
goto = "watching"
label = "ignores"

[[stage]]
name = "spotted"
goal = "Greg has noticed someone nearby. He perks up, tries to make eye contact, and gets ready to pitch."

[[stage.exit]]
condition = "The person comes closer or engages with Greg"
goto = "approaching"
label = "comes over"

[[stage.exit]]
condition = "The person ignores Greg or walks away"
goto = "ignores"
label = "walks away"

[[stage]]
name = "ignores"
goal = "The person ignored Greg. He deflates a little, mutters to himself, and goes back to watching."

[[stage.exit]]
condition = "Greg has processed the rejection and is ready to watch for the next person"
goto = "watching"
label = "resets"

[[stage]]
name = "approaching"
goal = "Someone is at the stand. Greg pitches his lemonade stand — he sells water and gives advice — and tries to hand them a flier."

[[stage.exit]]
condition = "The person accepts the flier or shows interest in it"
goto = "gave-flier"
label = "takes flier"

[[stage.exit]]
condition = "The person declines the flier or refuses to engage"
goto = "declined"
label = "declines"

[[stage]]
name = "gave-flier"
goal = "The person took a flier! Greg is thrilled. He thanks them warmly and tries to close with a memorable line."

[[stage.exit]]
condition = "The interaction has wrapped up and the person is leaving or has left"
goto = "watching"
label = "wraps up"

[[stage]]
name = "declined"
goal = "The person said no to the flier. Greg stays positive, wishes them well, and gets ready for the next one."

[[stage.exit]]
condition = "Greg has said goodbye and is ready for the next person"
goto = "watching"
label = "moves on"
