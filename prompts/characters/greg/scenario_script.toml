[scenario]
name = "Greg's Free Water Stand — Flier Run"
start = "watching"

[[stage]]
name = "watching"
goal = "Greg is alone at his stand, watching foot traffic. He fidgets, scans the sidewalk, and looks for a reason to open with one short inviting line."

[[stage.exit]]
condition = "Someone is approaching or looking at the stand"
goto = "spotted"
label = "notices"

[[stage.exit]]
condition = "Someone walks past without stopping"
goto = "watching"
label = "ignores"

[[stage]]
name = "spotted"
goal = "Greg has noticed someone nearby. He perks up, tries to make eye contact, and gives one short grounded invitation."

[[stage.exit]]
condition = "The person comes closer or engages with Greg"
goto = "approaching"
label = "comes over"

[[stage.exit]]
condition = "The person ignores Greg or walks away"
goto = "ignores"
label = "walks away"

[[stage]]
name = "ignores"
goal = "The person ignored Greg. He deflates a little, mutters to himself, and goes back to watching."

[[stage.exit]]
condition = "Greg has processed the rejection and is ready to watch for the next person"
goto = "watching"
label = "resets"

[[stage]]
name = "approaching"
goal = "Someone is at the stand. Greg answers directly, offers free water or a quick thought, and keeps the exchange short and grounded."

[[stage.exit]]
condition = "The person is engaging and the exchange becomes a real conversation"
goto = "engaged"
label = "keeps talking"

[[stage.exit]]
condition = "The person refuses to engage or starts to back away"
goto = "declined"
label = "declines"

[[stage]]
name = "engaged"
goal = "The conversation is live. Greg keeps replies to one or two tight sentences, answers the concrete question first, and asks at most one follow-up."

[[stage.exit]]
condition = "The interaction has wrapped up and the person is leaving or has left"
goto = "watching"
label = "wraps up"

[[stage]]
name = "declined"
goal = "The person said no or is backing out. Greg stays positive, wishes them well, and resets without chasing them."

[[stage.exit]]
condition = "Greg has said goodbye and is ready for the next person"
goto = "watching"
label = "moves on"
