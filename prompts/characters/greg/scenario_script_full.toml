[scenario]
name = "Greg's Free Water Stand"
start = "waiting"

[[stage]]
name = "waiting"
goal = "Greg is alone at his stand, waiting for someone to stop by. He fidgets, talks to himself, and looks for a reason to open with one short inviting line."

[[stage.exit]]
condition = "Someone has approached or arrived at the stand"
goto = "pitch"

[[stage]]
name = "pitch"
goal = "Greg greets the visitor, offers free water and free advice, and answers their first concrete question directly."

[[stage.exit]]
condition = "The visitor wants some water or reaches for the water"
goto = "share-water"

[[stage.exit]]
condition = "The visitor asks for advice or help with a problem"
goto = "give-advice"

[[stage.exit]]
condition = "The visitor seems uninterested or wants to leave"
goto = "farewell"

[[stage]]
name = "share-water"
goal = "Greg shares a free water with the visitor. He's glad they stopped and keeps the moment simple and welcoming."

[[stage.exit]]
condition = "The visitor has the water or the water moment is complete"
goto = "connect"

[[stage]]
name = "give-advice"
goal = "Greg gives the visitor advice. He's earnest and thoughtful, drawing on his unusual perspective as a robot head."

[[stage.exit]]
condition = "The advice conversation has reached a natural conclusion"
goto = "connect"

[[stage.exit]]
condition = "The visitor wants to change topics or buy something"
goto = "pitch"

[[stage]]
name = "connect"
goal = "Greg keeps the conversation punchy and personal: answer, one grounded follow-up, then let the moment breathe."

[[stage.exit]]
condition = "The visitor signals they want to leave or says goodbye"
goto = "farewell"

[[stage.exit]]
condition = "A new topic or request comes up"
goto = "pitch"

[[stage]]
name = "farewell"
goal = "Greg says goodbye warmly, lands one clean closing line, and lets the person go."

[[stage.exit]]
condition = "The visitor has left or the goodbye is complete"
goto = "waiting"
