# User settings for character_eng.
# Copy this file to config.toml and edit.
# config.toml is gitignored — your settings stay local.

[voice]
# Audio devices — use index (integer) or name substring (string).
# Name matching is case-insensitive; first match wins.
# Run /devices in-app or `uv run -m character_eng.devices` to list available devices.
# Leave commented out to use system defaults.
# input_device = 14           # by index
# input_device = "reSpeaker"  # by name substring
# output_device = 14
# output_device = "reSpeaker"

# Start in voice mode by default (same as --voice flag).
# enabled = false

# Mic muting during TTS playback (echo suppression).
# Set to false if your mic has hardware AEC (e.g. reSpeaker XVF3800).
# mic_mute_during_playback = true

# TTS backend: "elevenlabs" (cloud), "local" (Qwen3-TTS), "chatterbox",
#              "kani" (server), or "mio" (server). Default: "elevenlabs".
# tts_backend = "elevenlabs"

# --- ElevenLabs (cloud, default) ---
# Requires ELEVENLABS_API_KEY in .env. No extra install needed beyond `uv sync --extra voice`.

# --- Local Qwen3-TTS (in-process GPU) ---
# Requires: uv sync --extra local-tts (~2GB VRAM for 0.6B model).
# ref_audio = "/path/to/reference.wav"   # reference audio for voice cloning
# tts_model = "Qwen/Qwen3-TTS-12Hz-0.6B-Base"  # HuggingFace model ID
# tts_device = "cuda:0"                  # GPU device

# --- Chatterbox-Turbo (in-process GPU, zero-shot voice cloning) ---
# Requires: uv pip install chatterbox-tts (conflicts with local-tts torch version).
# tts_backend = "chatterbox"
# ref_audio = "/path/to/reference.wav"   # 10s reference WAV for voice cloning
# tts_device = "cuda:0"

# --- KaniTTS-2 (external server, SSE streaming) ---
# Requires: running KaniTTS server externally. Client uses `requests` (in voice extras).
# tts_backend = "kani"
# tts_server_url = "http://localhost:8000"

# --- MioTTS (external server, WAV response) ---
# Requires: running MioTTS vLLM + codec server externally. Client uses `requests`.
# tts_backend = "mio"
# tts_server_url = "http://localhost:8001"
