# User settings for character_eng.
# Copy this file to config.toml and edit.
# config.toml is gitignored — your settings stay local.

[voice]
# Audio devices — use index (integer) or name substring (string).
# Name matching is case-insensitive; first match wins.
# Run /devices in-app or `uv run -m character_eng.devices` to list available devices.
# Leave commented out to use system defaults.
# input_device = 14           # by index
# input_device = "reSpeaker"  # by name substring
# output_device = 14
# output_device = "reSpeaker"

# Start in voice mode by default (same as --voice flag).
# enabled = false

# Acoustic echo cancellation (WebRTC AEC3 via LiveKit).
# Keeps mic live during robot speech, enabling barge-in.
# Set to false to fall back to mic-muting during playback.
# aec = true

# TTS backend: "elevenlabs" (cloud), "qwen" (Qwen3-TTS, in-process GPU),
#              "pocket" (Pocket-TTS server), or "local" (alias for qwen).
#              Default: "elevenlabs".
# tts_backend = "elevenlabs"

# --- ElevenLabs (cloud, default) ---
# Requires ELEVENLABS_API_KEY in .env. No extra install needed beyond `uv sync --extra voice`.

# --- Qwen3-TTS (in-process GPU, voice cloning) ---
# Requires: uv sync --extra local-tts (~2GB VRAM for 0.6B model).
# tts_backend = "qwen"
# ref_audio = "/path/to/reference.wav"   # reference audio for voice cloning
# ref_text = ""                          # transcript of ref_audio for ICL mode (higher quality cloning)
# tts_model = "Qwen/Qwen3-TTS-12Hz-0.6B-Base"  # HuggingFace model ID
# tts_device = "cuda:0"                  # GPU device

# --- Pocket-TTS (external server, streaming voice cloning) ---
# Client uses `requests` (in voice extras). Supports voice cloning via
# ref_audio (WAV upload) or cached .safetensors voice file.
# Server auto-starts when not running and auto-stops on exit.
# For faster startup, run the server persistently in the background.
# tts_backend = "pocket"
# tts_server_url = "http://localhost:8003"
# ref_audio = "/path/to/reference.wav"   # WAV for voice cloning (optional)
# pocket_voice = "voices/greg.safetensors"  # voice file for pocket-tts serve --voice (default)

[vision]
# Enable vision by default (same as --vision flag).
# enabled = false

# Vision service URL. The service runs in services/vision/ with its own venv.
# service_url = "http://localhost:7860"
# service_port = 7860

# Auto-launch vision service if not running (same pattern as vLLM auto-launch).
# auto_launch = true

# Min seconds between vision synthesis cycles (poll + LLM distillation).
# synthesis_min_interval = 0.75

[dashboard]
# Real-time HTML dashboard. Opens in browser alongside the CLI.
# enabled = true

# HTTP port for the dashboard server.
# port = 7862
